name: Build Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: |
          dotnet publish ElectronicObserver.sln `
            -c Release `
            -o publish

      - name: Create ZIP
        shell: powershell
        run: |
          Compress-Archive -Path publish\* -DestinationPath ElectronicObserver.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ElectronicObserver
          path: ElectronicObserver.zip
