name: Build Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        shell: powershell
        run: |
          $configuration = "Release"
          $arch = "x64"
          $os = "win"
          $framework = "net10.0-windows10.0.17763.0"
          $selfContained = "false"
          $output = "$env:GITHUB_WORKSPACE\publish"

          cd .\Browser\
          dotnet publish `
            --configuration $configuration `
            --arch $arch `
            --os $os `
            --framework $framework `
            --self-contained $selfContained `
            --output $output

          cd ..

          cd .\ElectronicObserver\
          dotnet publish `
            --configuration $configuration `
            --arch $arch `
            --os $os `
            --framework $framework `
            --self-contained $selfContained `
            --output $output

      - name: Create ZIP
        shell: powershell
        run: |
          Compress-Archive `
            -Path "$env:GITHUB_WORKSPACE\publish\*" `
            -DestinationPath "$env:GITHUB_WORKSPACE\ElectronicObserver.zip"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ElectronicObserver
          path: ElectronicObserver.zip
